name: Bug report
description: Report a reproducible Writer Copilot problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private notes, session files, or personal filesystem paths.
  - type: input
    id: version
    attributes:
      label: Writer Copilot version
      placeholder: 0.1.3
    validations:
      required: true
  - type: input
    id: obsidian
    attributes:
      label: Obsidian version and operating system
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
